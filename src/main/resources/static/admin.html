<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insights Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">
            🛠️ <span class="brand">Insights</span>
            <span class="sub">Dashboard</span>
        </div>

        <div class="nav-buttons">
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>
    </nav>
</header>

<div class="container">
    <div class="dashboard-box">

        <!-- Stats -->
        <div class="stats">
            <div class="card">Total Feedback: <span id="totalCount">0</span></div>
            <div class="card">Today's Feedback: <span id="todayCount">0</span></div>
        </div>

        <!-- 🔥 Insight Line -->
        <div class="insight-line" id="topInsight">
            Loading insights...
        </div>

        <!-- 📊 Analytics -->
        <div class="analytics">
            <div class="insight-box">
                <h3>📊 Key Insights</h3>
                <ul id="insightList"></ul>
                <div id="insightBox" class="insight-warning"></div>
            </div>

            <div class="chart-box">
                <canvas id="chart"></canvas>
            </div>
        </div>

        <!-- 🎨 Category Cards -->
        <div class="category-cards" id="categoryCards"></div>

        <!-- Search + Filter -->
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search feedback...">

            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="Academic">Academic</option>
                <option value="Infrastructure">Infrastructure</option>
                <option value="Faculty">Faculty</option>
                <option value="Others">Others</option>
            </select>
        </div>

        <!-- Table -->
        <table class="feedback-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Category</th>
                <th>Content</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="feedbackTable"></tbody>
        </table>

        <!-- Pagination -->
        <div class="pagination">
            <button id="prevBtn" onclick="prevPage()">Prev</button>
            <span id="pageInfo"></span>
            <button id="nextBtn" onclick="nextPage()">Next</button>
        </div>

    </div>
</div>

<footer>
    <p>&copy; 2025 AnonInsight. All rights reserved.</p>
</footer>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script>
    let currentPage = 0;
    let allFeedbacks = [];
    let isLastPage = false;
    let chartInstance = null;

    // 🔐 Auth Headers
    function getAuthHeaders() {
        const token = localStorage.getItem("token");

        if (!token) {
            alert("Please login first!");
            window.location.href = "login.html";
            throw new Error("No token");
        }

        return {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        };
    }

    // 🔒 Role check
    if (localStorage.getItem("role") !== "ADMIN") {
         window.location.href = "login.html";
    }

    // 🚨 Unauthorized
    function handleUnauthorized() {
        alert("Session expired. Login again.");
        localStorage.removeItem("token");
        window.location.href = "login.html";
    }

    // 📊 Load Stats
    async function loadStats() {
        try {
            const res = await fetch("http://localhost:8080/api/feedback/admin/stats", {
                headers: getAuthHeaders()
            });

            if (res.status === 401 || res.status === 403) return handleUnauthorized();
            if (!res.ok) throw new Error("Failed to load stats");

            const data = await res.json();

            document.getElementById("totalCount").innerText = data.totalFeedback || 0;
            document.getElementById("todayCount").innerText = data.todayFeedback || 0;

        } catch (err) {
            console.error("Stats Error:", err);
        }
    }

    // 📋 Load Feedback
    async function loadFeedback() {
    try {
        const search = document.getElementById("searchInput").value.toLowerCase();
        const category = document.getElementById("categoryFilter").value;

        let url = "";
        let isCategoryMode = false;

        // 👉 If category selected → use category API
        if (category) {
            url = `http://localhost:8080/api/feedback/category/${category}`;
            isCategoryMode = true;
        } else {
            url = `http://localhost:8080/api/feedback/admin/all?page=${currentPage}&size=5&sortBy=createdAt&direction=desc`;
        }

        const res = await fetch(url, {
            headers: getAuthHeaders()
        });

        if (res.status === 401 || res.status === 403) return handleUnauthorized();
        if (!res.ok) throw new Error("Failed to fetch feedback");

        const data = await res.json();

        // ✅ Handle both API types
        if (isCategoryMode) {
            // category API returns array
            let filtered = data;

            // 🔍 apply search manually
            if (search) {
                filtered = filtered.filter(f =>
                    (f.content || "").toLowerCase().includes(search)
                );
            }

            allFeedbacks = filtered;
            isLastPage = true;

            renderTable(allFeedbacks);

            document.getElementById("pageInfo").innerText = "Filtered Results";
            document.getElementById("prevBtn").disabled = true;
            document.getElementById("nextBtn").disabled = true;

        } else {
            // normal paginated API
            allFeedbacks = data.content || [];
            isLastPage = data.last;

            // 🔍 apply search on current page
            let filtered = allFeedbacks;
            if (search) {
                filtered = allFeedbacks.filter(f =>
                    (f.content || "").toLowerCase().includes(search)
                );
            }

            renderTable(filtered);

            document.getElementById("pageInfo").innerText =
                "Page: " + (currentPage + 1) + " of " + data.totalPages;

            document.getElementById("prevBtn").disabled = currentPage === 0;
            document.getElementById("nextBtn").disabled = isLastPage;
        }

    } catch (err) {
        console.error("Stats Error:", err);
        showToast("Failed to load stats", "error");

    }
}

    // 🧾 Render Table
    function renderTable(feedbacks) {
    const table = document.getElementById("feedbackTable");

    if (feedbacks.length === 0) {
        table.innerHTML = `
        <tr>
            <td colspan="5" style="text-align:center; padding:20px; color:#888;">
                No feedback found
            </td>
        </tr>`;
        return;
    }

    let rows = "";

    feedbacks.forEach(f => {
        const isToday =
            new Date(f.createdAt).toDateString() === new Date().toDateString();

        rows += `
            <tr style="${isToday ? 'background-color:#e6f7ff;' : ''}">
                <td>${f.id}</td>
                <td>${f.category}</td>
                <td>${f.content}</td>
                <td>${f.createdAt ? new Date(f.createdAt).toLocaleString() : "N/A"}</td>
                <td>
                    <button class="delete-btn" onclick="deleteFeedback(${f.id})">Delete</button>
                </td>
            </tr>
        `;
    });

    table.innerHTML = rows;
}
    function showToast(message, type = "success") {
    const toast = document.getElementById("toast");

    toast.className = "toast";
    toast.offsetHeight;

    toast.innerText = message;
    toast.className = `toast show ${type}`;

    setTimeout(() => {
        toast.className = "toast";
    }, 3000);
}

    window.addEventListener("DOMContentLoaded", () => {
    const message = localStorage.getItem("toastMessage");

    if (message) {
        showToast(message, "success"); // ✅ show toast
        localStorage.removeItem("toastMessage");
    }
});

    // 🗑 Delete
    async function deleteFeedback(id) {
        if (!confirm("Are you sure you want to delete this feedback?")) return;

        try {
            const res = await fetch(`http://localhost:8080/api/feedback/delete/${id}`, {
                method: "DELETE",
                headers: getAuthHeaders()
            });

            if (res.status === 401 || res.status === 403) return handleUnauthorized();
            if (!res.ok) throw new Error("Delete failed");

            showToast("Feedback deleted successfully!", "success");

            loadFeedback();
            loadStats();
            loadAnalytics();

        } catch (err) {
            console.error("Delete Error:", err);
            showToast("Failed to delete feedback", "error");
        }
    }

    // 🔁 Pagination
    function nextPage() {
        if (!isLastPage) {
            currentPage++;
            loadFeedback();
        }
    }

    function prevPage() {
        if (currentPage > 0) {
            currentPage--;
            loadFeedback();
        }
    }
    // analytics
    async function loadAnalytics() {
    try {
        const res = await fetch("http://localhost:8080/api/feedback/admin/analytics", {
            headers: getAuthHeaders()
        });

        if (res.status === 401 || res.status === 403) return handleUnauthorized();

        const data = await res.json();

        const counts = data.counts;
        const topCategory = data.topCategory;

        // 🔥 Insight line
        document.getElementById("topInsight").innerText =
            `Most issues are reported in ${topCategory} category`;


        let insightHTML = "";


// 🔴 Highest
insightHTML += `<li style="font-weight:600;">🔴 Most complaints: <b>${topCategory} (${counts[topCategory]})</b></li>`;

const values = Object.values(counts);
const max = Math.max(...values);
const min = Math.min(...values);

const moderate = Object.entries(counts)
    .filter(([k, v]) => v >= max * 0.5 && v < max)
    .map(([k]) => k);

const least = Object.entries(counts)
    .filter(([k, v]) => v === min)
   .map(([k]) => k);

insightHTML += `<li>🟡 Moderate: <b>${
  moderate.length ? moderate.join(", ") : "None"
}</b></li>`;


insightHTML += `<li>🟢 Least Issues: <b>${
    least.length ? least.join(", ") : "None"
}</b></li>`;

document.getElementById("insightList").innerHTML = insightHTML;

// ✅ NEW SMART INSIGHT WITH PERCENTAGE
const total = Object.values(counts).reduce((a, b) => a + b, 0);

const percentage = total > 0
    ? Math.round((counts[topCategory] / total) * 100)
    : 0;

let message = `${topCategory} issues are highest (${percentage}%) — requires immediate attention`;

document.getElementById("insightBox").innerHTML =
    `⚠️ <b>Insight:</b><br>${message}`;

        // 🎨 Cards
const container = document.getElementById("categoryCards");
container.innerHTML = "";

const orderedLabels = ["Faculty", "Academic", "Infrastructure", "Others"];

orderedLabels.forEach(key => {
    let count = counts[key] || 0;

    let color = "green";
    let level = "Low";

    if (count === max && count > 0) {
        color = "red";
        level = "High";
    } else if (count > 0) {
        color = "orange";
        level = "Moderate";
    }

    container.innerHTML += `
        <div class="card" style="border-top:5px solid ${color}">
            <h3>${key}</h3>
            <p>Complaints: ${count}</p>
            <p style="color:${color}">${level}</p>
        </div>
    `;
});

        // 📊 Chart
if (chartInstance) {
    chartInstance.destroy();
}
const orderedData = orderedLabels.map(label => counts[label] || 0);

chartInstance = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
        labels: orderedLabels,
        datasets: [{
            label: "", // ❌ remove legend box
            data: orderedData,
            backgroundColor: [
                "#ff4d4d",
                "#ffd43b",
                "#51cf66",
                "#ced4da"
            ],
            borderRadius: 8,
            barThickness: 45
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,

        layout: {
            padding: {
                top: 10,
                left: 10,
                right: 10
            }
        },

        plugins: {
            legend: {
                display: false
            },

            title: {
                display: true,
                text: "📊 Feedback by Category",
                align: "center",
                padding: {
                    bottom: 30
                },
                font: {
                    size: 16,
                    weight: "bold"
                }
            },

            datalabels: {
                anchor: "end",
                align: "top",
                offset: 6,
                font: {
                    weight: "bold",
                    size: 14

                },
                color: "#000000"
            }
        },

        scales: {
            x: {
                grid: { display: false },
                ticks: {
                    color: "#000000",
                    font: {
                        weight: "bold"
                    }
                }
            },

            y: {
                beginAtZero: true,
                ticks: {
                    stepSize: 1,
                    color: "#000000",
                    font: {
                      weight: "bold",
                      size: 12
                    }
                },
                title: {
                    display: true,
                    text: "Count",
                    color: "#000000",
                    font: {
                       size: 14,
                       weight: "bold"
                    }
                }
            }
        }
    },

    plugins: [ChartDataLabels]
});
} catch (err) {
        console.error("Analytics Error:", err);
    }
}
    // 🔓 Logout
    function logout() {
    showToast("Logged out successfully", "success");

    setTimeout(() => {
        localStorage.clear();
        window.location.href = "index.html";
    }, 1000);
}


    document.getElementById("searchInput").addEventListener("input", () => {
    currentPage = 0;
    loadFeedback();
});

document.getElementById("categoryFilter").addEventListener("change", () => {
    currentPage = 0;
    loadFeedback();
});
    // 🚀 Init
    loadStats();
    loadFeedback();
    loadAnalytics();

    // 🔄 Auto Refresh
    setInterval(() => {
        loadStats();
        loadAnalytics();
    }, 10000);
</script>


</body>
</html>
