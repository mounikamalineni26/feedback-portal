<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
    <div class="navbar">
        <div class="logo">
            💬 <span class="brand">AnonInsight</span>
        </div>
    </div>
</header>

<div class="container">
    <div class="form-container">
        <h2>Register</h2>
        <form id="registerForm">
            <input type="text" id="username" placeholder="Username" required />
            <input type="password" id="password" placeholder="Password" required />
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required />


            <button type="submit" id="registerBtn" class="btn btn-primary">
                Register
            </button>

            <p class="link-text">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </form>
    </div>
</div>

<footer>
    <p>&copy; 2025 AnonInsight. All rights reserved.</p>
</footer>

<!-- ✅ Toast -->
<div id="toast" class="toast"></div>

<script>
    const registerBtn = document.getElementById("registerBtn");

    // ✅ Toast Function

    function showToast(message, type = "success") {
        const toast = document.getElementById("toast");

        toast.textContent = message;

        toast.className = "toast";

        toast.classList.add("show", type);

        setTimeout(() => {
            toast.classList.remove("show");
        }, 3000);
    }

    document.getElementById("registerForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

         // 🔴 Validation
        if (password !== confirmPassword) {
            showToast("Passwords do not match", "error");
            return;
        }

        // 🔄 Loading
        registerBtn.disabled = true;
        registerBtn.innerText = "Registering...";

        try {
            const response = await fetch("http://localhost:8080/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password})
            });

            const data = await response.text();

            if (response.ok) {
                // ✅ Store toast for login page
                localStorage.setItem("toastMessage", "Registered successfully! Please login.");

                // Redirect to login
                window.location.href = "login.html";

            } else {
                showToast(data.message || "Registration failed", "error");
            }

        } catch (err) {
            console.error("Register error:", err);
            showToast("Server error. Try again.", "error");

        } finally {
            registerBtn.disabled = false;
            registerBtn.innerText = "Register";
        }
    });
</script>

</body>
</html>
